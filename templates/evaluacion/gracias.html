{% extends 'base.html' %}
{% load static %}

{% block title %}¡Gracias! — FECOOPSE{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50 flex items-center justify-center px-4">
  <div class="bg-white rounded-3xl shadow-xl p-10 max-w-md w-full text-center">
    
    <div class="text-6xl mb-6">✅</div>
    
    <h1 class="text-2xl font-bold text-gray-800 mb-3">
      ¡Gracias por tu evaluación!
    </h1>
    
    <p class="text-gray-500 mb-6 leading-relaxed">
      Tu opinión es muy valiosa para FECOOPSE.<br>
      Tus respuestas han sido registradas correctamente.
    </p>
    
    <div class="bg-blue-50 rounded-2xl p-4 mb-8">
      <p class="text-feco-blue text-sm font-medium">
        "Liderazgo en Acción"
      </p>
    </div>
    
    <img src="{% static 'img/logo-fecoopse.png' %}" class="h-10 mx-auto opacity-60" alt="FECOOPSE">
    
  </div>
</div>
{% endblock %}
